name: Executar Script Interno

on: [push, workflow_dispatch]

jobs:
  execucao:
    runs-on: ubuntu-latest
    steps:
      # PASSO 1: Baixar o código do repositório para a VM
      - name: Checkout do código
        uses: actions/checkout@v4

      # PASSO 2: Garantir que o Python esteja instalado
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # PASSO 3: Executar o arquivo do seu repositório
      - name: Rodar meu_script.py
        run: python meu_script.py